<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Login</h3>
            <form>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" [(ngModel)]="loginObj.userName" name="userName" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="text" [(ngModel)]="loginObj.password" name="password" class="form-control" id="password" placeholder="Enter your password"
                        required>
                </div>
                
                <button type="button" class="btn btn-primary w-100" (click)="onLogin()">Login</button>
                 
            </form>
        </div>
    </div>
</div>
